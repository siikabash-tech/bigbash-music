<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BigBash Music</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 48px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .login-header h1 span { color: #D4AF37; }
        .login-header p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: #D4AF37;
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background: #F4D03F;
            transform: translateY(-2px);
        }
        .error-message {
            display: none;
            padding: 12px 16px;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 8px;
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }
        .error-message.show { display: block; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #D4AF37; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>BigBash <span>Music</span></h1>
            <p>Admin Panel Login</p>
        </div>
        <div class="error-message" id="errorMessage">Invalid email or password</div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="admin@bigbash-music.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <a href="/" class="back-link">← Back to Website</a>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('bigbash_admin_auth') === 'true') {
            window.location.href = 'dashboard.html';
        }

        // Default admin credentials
        const ADMIN_EMAIL = 'admin@bigbash-music.com';
        const ADMIN_PASSWORD = 'BigBash2024!';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                localStorage.setItem('bigbash_admin_auth', 'true');
                localStorage.setItem('bigbash_admin_user', email);
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        });
    </script>
</body>
</html>
