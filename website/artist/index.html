<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists - BigBash Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #D4AF37;
            text-decoration: none;
        }
        nav { display: flex; gap: 32px; }
        nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        nav a:hover, nav a.active { color: #D4AF37; }
        .page-content {
            padding: 120px 48px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .page-title {
            font-size: clamp(36px, 6vw, 56px);
            margin-bottom: 16px;
        }
        .page-title span { color: #D4AF37; }
        .page-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 18px;
            margin-bottom: 60px;
        }
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
        }
        .artist-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .artist-card:hover {
            border-color: rgba(212,175,55,0.3);
            transform: translateY(-8px);
        }
        .artist-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .artist-info {
            padding: 24px;
        }
        .artist-info h3 {
            font-size: 22px;
            margin-bottom: 4px;
        }
        .artist-info .genre {
            color: #D4AF37;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .artist-info .bio {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .social-links {
            display: flex;
            gap: 12px;
        }
        .social-links a {
            width: 36px;
            height: 36px;
            background: rgba(212,175,55,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #D4AF37;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .social-links a:hover {
            background: #D4AF37;
            color: #000;
        }
        footer {
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 40px 48px;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
        }
        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            nav { display: none; }
            .page-content { padding: 100px 20px 60px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">BigBash Music</a>
        <nav>
            <a href="/">Home</a>
            <a href="/artist/" class="active">Artist</a>
            <a href="/releases/">Releases</a>
            <a href="/epk/">EPK</a>
            <a href="/media/">Media</a>
            <a href="/submissions/">Submissions</a>
            <a href="/partners/">Partners</a>
            <a href="/contact/">Contact</a>
        </nav>
    </header>

    <div class="page-content">
        <h1 class="page-title">Our <span>Artists</span></h1>
        <p class="page-subtitle">Discover the talented artists on the BigBash Music roster.</p>
        
        <div class="artists-grid" id="artistsGrid">
            <!-- Artists loaded dynamically -->
        </div>
    </div>

    <footer id="footerText">© 2024 BigBash Music. All rights reserved.</footer>

    <script>
        function loadArtists() {
            const artists = JSON.parse(localStorage.getItem('bigbash_artists') || '[]');
            const publishedArtists = artists.filter(a => a.published);
            const container = document.getElementById('artistsGrid');
            
            if (publishedArtists.length === 0) {
                container.innerHTML = `
                    <div class="artist-card">
                        <img src="/images/artist-sungodez.jpg" alt="SunGodez">
                        <div class="artist-info">
                            <h3>SunGodez</h3>
                            <p class="genre">Afrobeat</p>
                            <p class="bio">Rising Afrobeat artist signed to BigBash Music. Known for powerful vocals and inspiring storytelling.</p>
                            <div class="social-links">
                                <a href="#">IG</a>
                                <a href="#">TW</a>
                                <a href="#">YT</a>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = publishedArtists.map(artist => `
                <div class="artist-card">
                    <img src="${artist.photo || '/images/artist-sungodez.jpg'}" alt="${artist.name}" onerror="this.src='/images/artist-sungodez.jpg'">
                    <div class="artist-info">
                        <h3>${artist.name}</h3>
                        <p class="genre">${artist.genre || 'Artist'}</p>
                        <p class="bio">${artist.bio || ''}</p>
                        <div class="social-links">
                            ${artist.instagram ? `<a href="https://instagram.com/${artist.instagram.replace('@','')}">IG</a>` : ''}
                            ${artist.twitter ? `<a href="https://twitter.com/${artist.twitter.replace('@','')}">TW</a>` : ''}
                            ${artist.youtube ? `<a href="${artist.youtube}">YT</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('bigbash_settings') || '{}');
            if (settings.footerText) document.getElementById('footerText').textContent = settings.footerText;
        }

        loadSettings();
        loadArtists();
    </script>
</body>
</html>
