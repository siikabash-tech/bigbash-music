<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media - BigBash Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #D4AF37;
            text-decoration: none;
        }
        nav { display: flex; gap: 32px; }
        nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        nav a:hover, nav a.active { color: #D4AF37; }
        .page-content {
            padding: 120px 48px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .page-title {
            font-size: clamp(36px, 6vw, 56px);
            margin-bottom: 16px;
        }
        .page-title span { color: #D4AF37; }
        .page-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 18px;
            margin-bottom: 60px;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .media-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .media-card:hover {
            border-color: rgba(212,175,55,0.3);
        }
        .media-preview {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .media-preview.pdf {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }
        .media-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .media-info {
            padding: 20px;
        }
        .media-info h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }
        .media-info p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-bottom: 16px;
        }
        .media-info a {
            display: inline-block;
            padding: 8px 16px;
            background: #D4AF37;
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .media-info a:hover {
            background: #F4D03F;
        }
        footer {
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 40px 48px;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
        }
        @media (max-width: 768px) {
            header { padding: 16px 20px; }
            nav { display: none; }
            .page-content { padding: 100px 20px 60px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">BigBash Music</a>
        <nav>
            <a href="/">Home</a>
            <a href="/artist/">Artist</a>
            <a href="/releases/">Releases</a>
            <a href="/epk/">EPK</a>
            <a href="/media/" class="active">Media</a>
            <a href="/submissions/">Submissions</a>
            <a href="/partners/">Partners</a>
            <a href="/contact/">Contact</a>
        </nav>
    </header>

    <div class="page-content">
        <h1 class="page-title">Media <span>Downloads</span></h1>
        <p class="page-subtitle">Download press kits, photos, and official documents.</p>
        
        <div class="media-grid" id="mediaGrid">
            <!-- Media loaded dynamically -->
        </div>
    </div>

    <footer id="footerText">© 2024 BigBash Music. All rights reserved.</footer>

    <script>
        function loadMedia() {
            const media = JSON.parse(localStorage.getItem('bigbash_media') || '[]');
            const container = document.getElementById('mediaGrid');
            
            if (media.length === 0) {
                container.innerHTML = `
                    <div class="media-card">
                        <div class="media-preview pdf">📄</div>
                        <div class="media-info">
                            <h3>BigBash Press Kit 2024</h3>
                            <p>Official press kit with artist bios and label information.</p>
                            <a href="#">Download PDF</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = media.map(item => {
                const isImage = item.type === 'image';
                const isPdf = item.type === 'pdf';
                const icon = isPdf ? '📄' : isImage ? '🖼️' : item.type === 'video' ? '🎬' : '🎵';
                
                return `
                    <div class="media-card">
                        <div class="media-preview ${item.type}">
                            ${isImage && item.url ? `<img src="${item.url}" alt="${item.title}" onerror="this.parentElement.innerHTML='${icon}'">` : icon}
                        </div>
                        <div class="media-info">
                            <h3>${item.title}</h3>
                            <p>${item.description || ''}</p>
                            <a href="${item.url}" target="_blank">${isPdf ? 'Download' : 'View'} ${item.type.toUpperCase()}</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('bigbash_settings') || '{}');
            if (settings.footerText) document.getElementById('footerText').textContent = settings.footerText;
        }

        loadSettings();
        loadMedia();
    </script>
</body>
</html>
