<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Releases - BigBash Music Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
        }
        
        /* Header */
        .admin-header {
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .admin-logo {
            font-size: 22px;
            font-weight: 700;
        }
        .admin-logo span { color: #D4AF37; }
        .admin-nav {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .admin-nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .admin-nav a:hover, .admin-nav a.active { color: #D4AF37; }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-user span {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            border-color: #dc3545;
            color: #dc3545;
        }
        
        /* Main Content */
        .admin-main {
            padding: 40px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 28px;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #D4AF37;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #F4D03F;
            transform: translateY(-2px);
        }
        
        /* Releases Grid */
        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .release-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .release-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-4px);
        }
        .release-artwork {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
            position: relative;
        }
        .release-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .release-status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-published { background: rgba(40, 167, 69, 0.9); color: #fff; }
        .status-draft { background: rgba(255, 193, 7, 0.9); color: #000; }
        .release-info {
            padding: 20px;
        }
        .release-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .release-artist {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }
        .release-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 16px;
        }
        .release-type {
            padding: 4px 10px;
            background: rgba(212, 175, 55, 0.15);
            border-radius: 4px;
            color: #D4AF37;
        }
        .release-actions {
            display: flex;
            gap: 8px;
        }
        .btn-edit, .btn-delete {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-edit {
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .btn-edit:hover {
            background: #D4AF37;
            color: #000;
        }
        .btn-delete {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        .btn-delete:hover {
            background: #dc3545;
            color: #fff;
        }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.5);
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h2 {
            font-size: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .modal-close:hover { color: #fff; }
        .modal-body {
            padding: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }
        .artwork-preview {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid rgba(212, 175, 55, 0.3);
            margin-top: 10px;
        }
        .tracklist-container {
            margin-bottom: 12px;
        }
        .tracklist-input {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .tracklist-input input {
            flex: 1;
        }
        .tracklist-input button {
            padding: 8px 12px;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 6px;
            color: #dc3545;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-add-track {
            padding: 10px 16px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px dashed rgba(212, 175, 55, 0.4);
            border-radius: 6px;
            color: #D4AF37;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-add-track:hover {
            background: rgba(212, 175, 55, 0.2);
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.1);
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .toggle.active {
            background: #28a745;
        }
        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        .toggle.active::after {
            transform: translateX(24px);
        }
        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-secondary {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: #fff;
        }
        .btn-save {
            padding: 10px 24px;
            background: #D4AF37;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            background: #F4D03F;
        }
        
        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .releases-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row, .form-row-3 { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .releases-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-logo">BigBash <span>Music</span></div>
        <nav class="admin-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="artists.html">Artists</a>
            <a href="releases.html" class="active">Releases</a>
            <a href="media.html">Media</a>
            <a href="submissions.html">Submissions</a>
            <a href="messages.html">Messages</a>
            <a href="settings.html">Settings</a>
        </nav>
        <div class="admin-user">
            <span id="userEmail">admin@bigbash-music.com</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1 class="page-title">Manage Releases</h1>
            <button class="btn-primary" onclick="openModal()">+ Add New Release</button>
        </div>
        
        <div class="releases-grid" id="releasesGrid">
            <!-- Releases will be loaded here -->
        </div>
    </main>

    <!-- Add/Edit Release Modal -->
    <div class="modal-overlay" id="releaseModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Release</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="releaseForm">
                    <input type="hidden" id="releaseId">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="releaseTitle">Release Title *</label>
                            <input type="text" id="releaseTitle" required placeholder="e.g. Reborn">
                        </div>
                        <div class="form-group">
                            <label for="releaseArtist">Artist Name *</label>
                            <input type="text" id="releaseArtist" required placeholder="e.g. SunGodez">
                        </div>
                    </div>
                    <div class="form-row-3">
                        <div class="form-group">
                            <label for="releaseType">Type</label>
                            <select id="releaseType">
                                <option value="Album">Album</option>
                                <option value="EP">EP</option>
                                <option value="Single">Single</option>
                                <option value="Mixtape">Mixtape</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="releaseDate">Release Date</label>
                            <input type="date" id="releaseDate">
                        </div>
                        <div class="form-group">
                            <label for="releaseGenre">Genre</label>
                            <input type="text" id="releaseGenre" placeholder="e.g. Afrobeat">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="releaseArtwork">Artwork URL</label>
                        <input type="text" id="releaseArtwork" placeholder="https://... or images/album-name.jpg">
                        <img id="artworkPreview" class="artwork-preview" style="display:none;">
                    </div>
                    <div class="form-group">
                        <label for="releaseDescription">Description</label>
                        <textarea id="releaseDescription" placeholder="Enter release description..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="releaseSpotify">Spotify URL</label>
                            <input type="text" id="releaseSpotify" placeholder="https://open.spotify.com/...">
                        </div>
                        <div class="form-group">
                            <label for="releaseApple">Apple Music URL</label>
                            <input type="text" id="releaseApple" placeholder="https://music.apple.com/...">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="releaseYouTube">YouTube URL</label>
                            <input type="text" id="releaseYouTube" placeholder="https://youtube.com/...">
                        </div>
                        <div class="form-group">
                            <label for="releaseSoundCloud">SoundCloud URL</label>
                            <input type="text" id="releaseSoundCloud" placeholder="https://soundcloud.com/...">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Tracklist</label>
                        <div class="tracklist-container" id="tracklistContainer">
                            <!-- Track inputs will be added here -->
                        </div>
                        <button type="button" class="btn-add-track" onclick="addTrackInput()">+ Add Track</button>
                    </div>
                    <div class="form-group">
                        <label>Published Status</label>
                        <div class="toggle-group">
                            <div class="toggle" id="publishedToggle" onclick="togglePublished()"></div>
                            <span id="publishedText">Draft</span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveRelease()">Save Release</button>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        if (localStorage.getItem('bigbash_admin_auth') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display user email
        const userEmail = localStorage.getItem('bigbash_admin_user') || 'admin@bigbash-music.com';
        document.getElementById('userEmail').textContent = userEmail;

        let isPublished = false;

        // Toggle published status
        function togglePublished() {
            isPublished = !isPublished;
            const toggle = document.getElementById('publishedToggle');
            const text = document.getElementById('publishedText');
            toggle.classList.toggle('active', isPublished);
            text.textContent = isPublished ? 'Published' : 'Draft';
        }

        // Load releases
        function loadReleases() {
            const releases = JSON.parse(localStorage.getItem('bigbash_releases') || '[]');
            const container = document.getElementById('releasesGrid');
            
            if (releases.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎵</div>
                        <h3>No releases yet</h3>
                        <p>Add your first release to get started</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = releases.map(release => `
                <div class="release-card" data-id="${release.id}">
                    <div class="release-artwork">
                        <img src="${release.artwork || 'images/album-reborn.jpg'}" alt="${release.title}" onerror="this.src='images/album-reborn.jpg'">
                        <span class="release-status-badge ${release.published ? 'status-published' : 'status-draft'}">
                            ${release.published ? 'Published' : 'Draft'}
                        </span>
                    </div>
                    <div class="release-info">
                        <div class="release-title">${release.title}</div>
                        <div class="release-artist">${release.artist}</div>
                        <div class="release-meta">
                            <span class="release-type">${release.type || 'Single'}</span>
                            <span>${release.date ? new Date(release.date).getFullYear() : '2024'}</span>
                        </div>
                        <div class="release-actions">
                            <button class="btn-edit" onclick="editRelease('${release.id}')">Edit</button>
                            <button class="btn-delete" onclick="deleteRelease('${release.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Modal functions
        function openModal(releaseId = null) {
            document.getElementById('releaseModal').classList.add('show');
            document.getElementById('releaseForm').reset();
            document.getElementById('releaseId').value = '';
            document.getElementById('artworkPreview').style.display = 'none';
            document.getElementById('tracklistContainer').innerHTML = '';
            document.getElementById('modalTitle').textContent = releaseId ? 'Edit Release' : 'Add New Release';
            isPublished = false;
            document.getElementById('publishedToggle').classList.remove('active');
            document.getElementById('publishedText').textContent = 'Draft';
            
            if (releaseId) {
                const releases = JSON.parse(localStorage.getItem('bigbash_releases') || '[]');
                const release = releases.find(r => r.id === releaseId);
                if (release) {
                    document.getElementById('releaseId').value = release.id;
                    document.getElementById('releaseTitle').value = release.title;
                    document.getElementById('releaseArtist').value = release.artist;
                    document.getElementById('releaseType').value = release.type || 'Single';
                    document.getElementById('releaseDate').value = release.date || '';
                    document.getElementById('releaseGenre').value = release.genre || '';
                    document.getElementById('releaseArtwork').value = release.artwork || '';
                    document.getElementById('releaseDescription').value = release.description || '';
                    document.getElementById('releaseSpotify').value = release.spotify || '';
                    document.getElementById('releaseApple').value = release.apple || '';
                    document.getElementById('releaseYouTube').value = release.youtube || '';
                    document.getElementById('releaseSoundCloud').value = release.soundcloud || '';
                    
                    isPublished = release.published || false;
                    document.getElementById('publishedToggle').classList.toggle('active', isPublished);
                    document.getElementById('publishedText').textContent = isPublished ? 'Published' : 'Draft';
                    
                    if (release.artwork) {
                        document.getElementById('artworkPreview').src = release.artwork;
                        document.getElementById('artworkPreview').style.display = 'block';
                    }
                    
                    // Load tracklist
                    if (release.tracklist && release.tracklist.length > 0) {
                        release.tracklist.forEach(track => addTrackInput(track));
                    }
                }
            }
        }

        function closeModal() {
            document.getElementById('releaseModal').classList.remove('show');
        }

        // Artwork preview
        document.getElementById('releaseArtwork').addEventListener('input', function() {
            const url = this.value;
            const preview = document.getElementById('artworkPreview');
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });

        // Add track input
        function addTrackInput(value = '') {
            const container = document.getElementById('tracklistContainer');
            const div = document.createElement('div');
            div.className = 'tracklist-input';
            div.innerHTML = `
                <input type="text" class="track-input" placeholder="Track name" value="${value}">
                <button type="button" onclick="this.parentElement.remove()">Remove</button>
            `;
            container.appendChild(div);
        }

        // Save release
        function saveRelease() {
            const id = document.getElementById('releaseId').value;
            const title = document.getElementById('releaseTitle').value.trim();
            const artist = document.getElementById('releaseArtist').value.trim();
            
            if (!title || !artist) {
                alert('Please enter both title and artist name');
                return;
            }
            
            // Get tracklist
            const trackInputs = document.querySelectorAll('.track-input');
            const tracklist = Array.from(trackInputs).map(input => input.value.trim()).filter(v => v);
            
            const releases = JSON.parse(localStorage.getItem('bigbash_releases') || '[]');
            
            const releaseData = {
                id: id || Date.now().toString(),
                title: title,
                artist: artist,
                type: document.getElementById('releaseType').value,
                date: document.getElementById('releaseDate').value,
                genre: document.getElementById('releaseGenre').value.trim(),
                artwork: document.getElementById('releaseArtwork').value.trim(),
                description: document.getElementById('releaseDescription').value.trim(),
                spotify: document.getElementById('releaseSpotify').value.trim(),
                apple: document.getElementById('releaseApple').value.trim(),
                youtube: document.getElementById('releaseYouTube').value.trim(),
                soundcloud: document.getElementById('releaseSoundCloud').value.trim(),
                tracklist: tracklist,
                published: isPublished,
                updatedAt: new Date().toISOString()
            };
            
            if (id) {
                const index = releases.findIndex(r => r.id === id);
                if (index !== -1) {
                    releaseData.createdAt = releases[index].createdAt;
                    releases[index] = releaseData;
                }
            } else {
                releaseData.createdAt = new Date().toISOString();
                releases.push(releaseData);
            }
            
            localStorage.setItem('bigbash_releases', JSON.stringify(releases));
            localStorage.setItem('bigbash_last_update', new Date().toISOString());
            
            closeModal();
            loadReleases();
        }

        // Edit release
        function editRelease(id) {
            openModal(id);
        }

        // Delete release
        function deleteRelease(id) {
            if (confirm('Are you sure you want to delete this release?')) {
                const releases = JSON.parse(localStorage.getItem('bigbash_releases') || '[]');
                const filtered = releases.filter(r => r.id !== id);
                localStorage.setItem('bigbash_releases', JSON.stringify(filtered));
                localStorage.setItem('bigbash_last_update', new Date().toISOString());
                loadReleases();
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('bigbash_admin_auth');
            localStorage.removeItem('bigbash_admin_user');
            window.location.href = 'login.html';
        }

        // Close modal on overlay click
        document.getElementById('releaseModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        loadReleases();
    </script>
</body>
</html>
