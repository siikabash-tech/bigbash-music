<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Media - BigBash Music Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
        }
        
        /* Header */
        .admin-header {
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .admin-logo {
            font-size: 22px;
            font-weight: 700;
        }
        .admin-logo span { color: #D4AF37; }
        .admin-nav {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .admin-nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .admin-nav a:hover, .admin-nav a.active { color: #D4AF37; }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-user span {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            border-color: #dc3545;
            color: #dc3545;
        }
        
        /* Main Content */
        .admin-main {
            padding: 40px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 28px;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #D4AF37;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #F4D03F;
            transform: translateY(-2px);
        }
        
        /* Media Grid */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }
        .media-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .media-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-4px);
        }
        .media-preview {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
            position: relative;
        }
        .media-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .media-preview.pdf {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }
        .media-category {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .media-info {
            padding: 16px;
        }
        .media-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .media-type {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .media-actions {
            display: flex;
            gap: 8px;
        }
        .btn-edit, .btn-delete {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-edit {
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .btn-edit:hover {
            background: #D4AF37;
            color: #000;
        }
        .btn-delete {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        .btn-delete:hover {
            background: #dc3545;
            color: #fff;
        }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.5);
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn:hover, .filter-btn.active {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.4);
            color: #D4AF37;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h2 {
            font-size: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .modal-close:hover { color: #fff; }
        .modal-body {
            padding: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .file-preview {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid rgba(212, 175, 55, 0.3);
            margin-top: 10px;
        }
        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-secondary {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: #fff;
        }
        .btn-save {
            padding: 10px 24px;
            background: #D4AF37;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            background: #F4D03F;
        }
        
        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .media-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .media-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-logo">BigBash <span>Music</span></div>
        <nav class="admin-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="artists.html">Artists</a>
            <a href="releases.html">Releases</a>
            <a href="media.html" class="active">Media</a>
            <a href="submissions.html">Submissions</a>
            <a href="messages.html">Messages</a>
            <a href="settings.html">Settings</a>
        </nav>
        <div class="admin-user">
            <span id="userEmail">admin@bigbash-music.com</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1 class="page-title">Manage Media Files</h1>
            <button class="btn-primary" onclick="openModal()">+ Upload File</button>
        </div>
        
        <div class="category-filter">
            <button class="filter-btn active" onclick="filterMedia('all')">All Files</button>
            <button class="filter-btn" onclick="filterMedia('press')">Press Materials</button>
            <button class="filter-btn" onclick="filterMedia('photo')">Photos</button>
            <button class="filter-btn" onclick="filterMedia('document')">Documents</button>
            <button class="filter-btn" onclick="filterMedia('other')">Other</button>
        </div>
        
        <div class="media-grid" id="mediaGrid">
            <!-- Media files will be loaded here -->
        </div>
    </main>

    <!-- Add/Edit Media Modal -->
    <div class="modal-overlay" id="mediaModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Upload File</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="mediaForm">
                    <input type="hidden" id="mediaId">
                    <div class="form-group">
                        <label for="mediaTitle">File Title *</label>
                        <input type="text" id="mediaTitle" required placeholder="e.g. Press Kit 2024">
                    </div>
                    <div class="form-group">
                        <label for="mediaType">File Type</label>
                        <select id="mediaType">
                            <option value="image">Image</option>
                            <option value="pdf">PDF Document</option>
                            <option value="video">Video</option>
                            <option value="audio">Audio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="mediaUrl">File URL *</label>
                        <input type="text" id="mediaUrl" required placeholder="https://... or /path/to/file.pdf">
                        <img id="filePreview" class="file-preview" style="display:none;">
                    </div>
                    <div class="form-group">
                        <label for="mediaDescription">Description</label>
                        <textarea id="mediaDescription" placeholder="Enter file description..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="mediaCategory">Category</label>
                        <select id="mediaCategory">
                            <option value="press">Artist Press Materials</option>
                            <option value="document">Label Documents</option>
                            <option value="album">Album & Streaming Documents</option>
                            <option value="photo">Photos</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveMedia()">Save File</button>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        if (localStorage.getItem('bigbash_admin_auth') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display user email
        const userEmail = localStorage.getItem('bigbash_admin_user') || 'admin@bigbash-music.com';
        document.getElementById('userEmail').textContent = userEmail;

        let currentFilter = 'all';

        // Load media files
        function loadMedia() {
            const media = JSON.parse(localStorage.getItem('bigbash_media') || '[]');
            const container = document.getElementById('mediaGrid');
            
            const filtered = currentFilter === 'all' 
                ? media 
                : media.filter(m => m.category === currentFilter);
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <h3>No media files yet</h3>
                        <p>Upload your first file to get started</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(item => {
                const isImage = item.type === 'image';
                const isPdf = item.type === 'pdf';
                const icon = isPdf ? '📄' : isImage ? '🖼️' : item.type === 'video' ? '🎬' : '🎵';
                
                return `
                    <div class="media-card" data-id="${item.id}">
                        <div class="media-preview ${item.type}">
                            ${isImage && item.url ? `<img src="${item.url}" alt="${item.title}" onerror="this.parentElement.innerHTML='${icon}'">` : icon}
                            <span class="media-category">${item.category}</span>
                        </div>
                        <div class="media-info">
                            <div class="media-title">${item.title}</div>
                            <div class="media-type">${item.type.toUpperCase()}</div>
                            <div class="media-actions">
                                <button class="btn-edit" onclick="editMedia('${item.id}')">Edit</button>
                                <button class="btn-delete" onclick="deleteMedia('${item.id}')">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Filter media
        function filterMedia(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadMedia();
        }

        // Modal functions
        function openModal(mediaId = null) {
            document.getElementById('mediaModal').classList.add('show');
            document.getElementById('mediaForm').reset();
            document.getElementById('mediaId').value = '';
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('modalTitle').textContent = mediaId ? 'Edit File' : 'Upload File';
            
            if (mediaId) {
                const media = JSON.parse(localStorage.getItem('bigbash_media') || '[]');
                const item = media.find(m => m.id === mediaId);
                if (item) {
                    document.getElementById('mediaId').value = item.id;
                    document.getElementById('mediaTitle').value = item.title;
                    document.getElementById('mediaType').value = item.type;
                    document.getElementById('mediaUrl').value = item.url;
                    document.getElementById('mediaDescription').value = item.description || '';
                    document.getElementById('mediaCategory').value = item.category || 'other';
                    
                    if (item.type === 'image' && item.url) {
                        document.getElementById('filePreview').src = item.url;
                        document.getElementById('filePreview').style.display = 'block';
                    }
                }
            }
        }

        function closeModal() {
            document.getElementById('mediaModal').classList.remove('show');
        }

        // File preview
        document.getElementById('mediaUrl').addEventListener('input', function() {
            const url = this.value;
            const type = document.getElementById('mediaType').value;
            const preview = document.getElementById('filePreview');
            if (url && type === 'image') {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });

        document.getElementById('mediaType').addEventListener('change', function() {
            const url = document.getElementById('mediaUrl').value;
            const preview = document.getElementById('filePreview');
            if (this.value === 'image' && url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });

        // Save media
        function saveMedia() {
            const id = document.getElementById('mediaId').value;
            const title = document.getElementById('mediaTitle').value.trim();
            const url = document.getElementById('mediaUrl').value.trim();
            
            if (!title || !url) {
                alert('Please enter both title and file URL');
                return;
            }
            
            const media = JSON.parse(localStorage.getItem('bigbash_media') || '[]');
            
            const mediaData = {
                id: id || Date.now().toString(),
                title: title,
                type: document.getElementById('mediaType').value,
                url: url,
                description: document.getElementById('mediaDescription').value.trim(),
                category: document.getElementById('mediaCategory').value,
                updatedAt: new Date().toISOString()
            };
            
            if (id) {
                const index = media.findIndex(m => m.id === id);
                if (index !== -1) {
                    mediaData.createdAt = media[index].createdAt;
                    media[index] = mediaData;
                }
            } else {
                mediaData.createdAt = new Date().toISOString();
                media.push(mediaData);
            }
            
            localStorage.setItem('bigbash_media', JSON.stringify(media));
            localStorage.setItem('bigbash_last_update', new Date().toISOString());
            
            closeModal();
            loadMedia();
        }

        // Edit media
        function editMedia(id) {
            openModal(id);
        }

        // Delete media
        function deleteMedia(id) {
            if (confirm('Are you sure you want to delete this file?')) {
                const media = JSON.parse(localStorage.getItem('bigbash_media') || '[]');
                const filtered = media.filter(m => m.id !== id);
                localStorage.setItem('bigbash_media', JSON.stringify(filtered));
                localStorage.setItem('bigbash_last_update', new Date().toISOString());
                loadMedia();
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('bigbash_admin_auth');
            localStorage.removeItem('bigbash_admin_user');
            window.location.href = 'login.html';
        }

        // Close modal on overlay click
        document.getElementById('mediaModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        loadMedia();
    </script>
</body>
</html>
