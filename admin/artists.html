<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Artists - BigBash Music Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
        }
        
        /* Header */
        .admin-header {
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .admin-logo {
            font-size: 22px;
            font-weight: 700;
        }
        .admin-logo span { color: #D4AF37; }
        .admin-nav {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .admin-nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .admin-nav a:hover, .admin-nav a.active { color: #D4AF37; }
        .admin-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-user span {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            border-color: #dc3545;
            color: #dc3545;
        }
        
        /* Main Content */
        .admin-main {
            padding: 40px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-title {
            font-size: 28px;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #D4AF37;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #F4D03F;
            transform: translateY(-2px);
        }
        
        /* Artists Grid */
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .artist-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .artist-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-4px);
        }
        .artist-image {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .artist-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .artist-info {
            padding: 20px;
        }
        .artist-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .artist-meta {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }
        .artist-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .status-published {
            background: rgba(40, 167, 69, 0.15);
            color: #28a745;
        }
        .status-draft {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        .artist-actions {
            display: flex;
            gap: 8px;
        }
        .btn-edit, .btn-delete {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-edit {
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .btn-edit:hover {
            background: #D4AF37;
            color: #000;
        }
        .btn-delete {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        .btn-delete:hover {
            background: #dc3545;
            color: #fff;
        }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.5);
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h2 {
            font-size: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .modal-close:hover { color: #fff; }
        .modal-body {
            padding: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .photo-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(212, 175, 55, 0.3);
            margin-top: 10px;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.1);
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .toggle.active {
            background: #28a745;
        }
        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        .toggle.active::after {
            transform: translateX(24px);
        }
        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-secondary {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            border-color: #fff;
        }
        .btn-save {
            padding: 10px 24px;
            background: #D4AF37;
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            background: #F4D03F;
        }
        
        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .artists-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-logo">BigBash <span>Music</span></div>
        <nav class="admin-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="artists.html" class="active">Artists</a>
            <a href="releases.html">Releases</a>
            <a href="media.html">Media</a>
            <a href="submissions.html">Submissions</a>
            <a href="messages.html">Messages</a>
            <a href="settings.html">Settings</a>
        </nav>
        <div class="admin-user">
            <span id="userEmail">admin@bigbash-music.com</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1 class="page-title">Manage Artists</h1>
            <button class="btn-primary" onclick="openModal()">+ Add New Artist</button>
        </div>
        
        <div class="artists-grid" id="artistsGrid">
            <!-- Artists will be loaded here -->
        </div>
    </main>

    <!-- Add/Edit Artist Modal -->
    <div class="modal-overlay" id="artistModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Artist</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="artistForm">
                    <input type="hidden" id="artistId">
                    <div class="form-group">
                        <label for="artistName">Artist Name *</label>
                        <input type="text" id="artistName" required placeholder="e.g. SunGodez">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="artistGenre">Genre</label>
                            <input type="text" id="artistGenre" placeholder="e.g. Afrobeat">
                        </div>
                        <div class="form-group">
                            <label for="artistRole">Role</label>
                            <input type="text" id="artistRole" placeholder="e.g. Artist & Songwriter">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="artistPhoto">Photo URL</label>
                        <input type="text" id="artistPhoto" placeholder="https://... or images/artist-name.jpg">
                        <img id="photoPreview" class="photo-preview" style="display:none;">
                    </div>
                    <div class="form-group">
                        <label for="artistBio">Biography</label>
                        <textarea id="artistBio" placeholder="Enter artist biography..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="artistInstagram">Instagram</label>
                            <input type="text" id="artistInstagram" placeholder="@username">
                        </div>
                        <div class="form-group">
                            <label for="artistTwitter">Twitter</label>
                            <input type="text" id="artistTwitter" placeholder="@username">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="artistSpotify">Spotify URL</label>
                            <input type="text" id="artistSpotify" placeholder="https://open.spotify.com/...">
                        </div>
                        <div class="form-group">
                            <label for="artistYouTube">YouTube URL</label>
                            <input type="text" id="artistYouTube" placeholder="https://youtube.com/...">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Published Status</label>
                        <div class="toggle-group">
                            <div class="toggle" id="publishedToggle" onclick="togglePublished()"></div>
                            <span id="publishedText">Draft</span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveArtist()">Save Artist</button>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        if (localStorage.getItem('bigbash_admin_auth') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display user email
        const userEmail = localStorage.getItem('bigbash_admin_user') || 'admin@bigbash-music.com';
        document.getElementById('userEmail').textContent = userEmail;

        let isPublished = false;

        // Toggle published status
        function togglePublished() {
            isPublished = !isPublished;
            const toggle = document.getElementById('publishedToggle');
            const text = document.getElementById('publishedText');
            toggle.classList.toggle('active', isPublished);
            text.textContent = isPublished ? 'Published' : 'Draft';
        }

        // Load artists
        function loadArtists() {
            const artists = JSON.parse(localStorage.getItem('bigbash_artists') || '[]');
            const container = document.getElementById('artistsGrid');
            
            if (artists.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎤</div>
                        <h3>No artists yet</h3>
                        <p>Add your first artist to get started</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = artists.map(artist => `
                <div class="artist-card" data-id="${artist.id}">
                    <div class="artist-image">
                        <img src="${artist.photo || 'images/artist-sungodez.jpg'}" alt="${artist.name}" onerror="this.src='images/artist-sungodez.jpg'">
                    </div>
                    <div class="artist-info">
                        <div class="artist-name">${artist.name}</div>
                        <div class="artist-meta">${artist.genre || 'No genre'} ${artist.role ? '• ' + artist.role : ''}</div>
                        <span class="artist-status ${artist.published ? 'status-published' : 'status-draft'}">
                            ${artist.published ? '● Published' : '○ Draft'}
                        </span>
                        <div class="artist-actions">
                            <button class="btn-edit" onclick="editArtist('${artist.id}')">Edit</button>
                            <button class="btn-delete" onclick="deleteArtist('${artist.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Modal functions
        function openModal(artistId = null) {
            document.getElementById('artistModal').classList.add('show');
            document.getElementById('artistForm').reset();
            document.getElementById('artistId').value = '';
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('modalTitle').textContent = artistId ? 'Edit Artist' : 'Add New Artist';
            isPublished = false;
            document.getElementById('publishedToggle').classList.remove('active');
            document.getElementById('publishedText').textContent = 'Draft';
            
            if (artistId) {
                const artists = JSON.parse(localStorage.getItem('bigbash_artists') || '[]');
                const artist = artists.find(a => a.id === artistId);
                if (artist) {
                    document.getElementById('artistId').value = artist.id;
                    document.getElementById('artistName').value = artist.name;
                    document.getElementById('artistGenre').value = artist.genre || '';
                    document.getElementById('artistRole').value = artist.role || '';
                    document.getElementById('artistPhoto').value = artist.photo || '';
                    document.getElementById('artistBio').value = artist.bio || '';
                    document.getElementById('artistInstagram').value = artist.instagram || '';
                    document.getElementById('artistTwitter').value = artist.twitter || '';
                    document.getElementById('artistSpotify').value = artist.spotify || '';
                    document.getElementById('artistYouTube').value = artist.youtube || '';
                    
                    isPublished = artist.published || false;
                    document.getElementById('publishedToggle').classList.toggle('active', isPublished);
                    document.getElementById('publishedText').textContent = isPublished ? 'Published' : 'Draft';
                    
                    if (artist.photo) {
                        document.getElementById('photoPreview').src = artist.photo;
                        document.getElementById('photoPreview').style.display = 'block';
                    }
                }
            }
        }

        function closeModal() {
            document.getElementById('artistModal').classList.remove('show');
        }

        // Photo preview
        document.getElementById('artistPhoto').addEventListener('input', function() {
            const url = this.value;
            const preview = document.getElementById('photoPreview');
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });

        // Save artist
        function saveArtist() {
            const id = document.getElementById('artistId').value;
            const name = document.getElementById('artistName').value.trim();
            
            if (!name) {
                alert('Please enter an artist name');
                return;
            }
            
            const artists = JSON.parse(localStorage.getItem('bigbash_artists') || '[]');
            
            const artistData = {
                id: id || Date.now().toString(),
                name: name,
                genre: document.getElementById('artistGenre').value.trim(),
                role: document.getElementById('artistRole').value.trim(),
                photo: document.getElementById('artistPhoto').value.trim(),
                bio: document.getElementById('artistBio').value.trim(),
                instagram: document.getElementById('artistInstagram').value.trim(),
                twitter: document.getElementById('artistTwitter').value.trim(),
                spotify: document.getElementById('artistSpotify').value.trim(),
                youtube: document.getElementById('artistYouTube').value.trim(),
                published: isPublished,
                updatedAt: new Date().toISOString()
            };
            
            if (id) {
                const index = artists.findIndex(a => a.id === id);
                if (index !== -1) {
                    artistData.createdAt = artists[index].createdAt;
                    artists[index] = artistData;
                }
            } else {
                artistData.createdAt = new Date().toISOString();
                artists.push(artistData);
            }
            
            localStorage.setItem('bigbash_artists', JSON.stringify(artists));
            localStorage.setItem('bigbash_last_update', new Date().toISOString());
            
            closeModal();
            loadArtists();
        }

        // Edit artist
        function editArtist(id) {
            openModal(id);
        }

        // Delete artist
        function deleteArtist(id) {
            if (confirm('Are you sure you want to delete this artist?')) {
                const artists = JSON.parse(localStorage.getItem('bigbash_artists') || '[]');
                const filtered = artists.filter(a => a.id !== id);
                localStorage.setItem('bigbash_artists', JSON.stringify(filtered));
                localStorage.setItem('bigbash_last_update', new Date().toISOString());
                loadArtists();
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('bigbash_admin_auth');
            localStorage.removeItem('bigbash_admin_user');
            window.location.href = 'login.html';
        }

        // Close modal on overlay click
        document.getElementById('artistModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        loadArtists();
    </script>
</body>
</html>
